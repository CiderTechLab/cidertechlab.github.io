<!doctype html>
<html lang="ja">
	<head>
		<!-- meta info -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="author" content="S.K" />
		<meta
			name="description"
			content="カップラーメンの完成時間を計測するWebアプリです。JavaScriptのタイマー関数の練習で制作し、Vanilla JavaScriptで制作しました。"
		/>
		<title>カップラーメンタイマー - CiderTechLab</title>
		<!-- style info -->
		<link href="/styles/base/destyle.css" rel="stylesheet" />
		<link href="/styles/base/base.css" rel="stylesheet" />
		<link href="/styles/layout/layout.css" rel="stylesheet" />
		<link href="/styles/layout/header.css" rel="stylesheet" />
		<link href="/styles/layout/footer.css" rel="stylesheet" />
		<link href="/styles/components/card.css" rel="stylesheet" />
		<link href="/styles/pages/ramen-timer.css" rel="stylesheet" />
		<link rel="icon" href="/images/favicon.ico" sizes="32x32" />
		<link rel="apple-touch-icon" href="/images/favicon.png" />
		<!-- script info -->
		<script src="/scripts/header_footer.js" defer></script>
		<script type="module" src="/scripts/ramen-timer.js" defer></script>
	</head>
	<body>
		<header class="header basic-layout__header"></header>
		<nav class="breadcrumb"></nav>
		<main>
			<article class="ramen-timer-layout">
				<section class="hero-section">
					<h2 class="hero-section__title">
						カップラーメン<br class="br-sp" />タイマー
					</h2>
					<ol class="hero-section__ol">
						<li class="hero-section__li">
							<b>「時間を選択してください」</b>の欄から待ち時間を選択します。
						</li>
						<li class="hero-section__li">
							<b>［スタート］</b>ボタンを押すとタイマーが開始されます。
						</li>
						<li class="hero-section__li">
							時間が0になると<b>「完成」</b>のダイアログが表示されます。
						</li>
						<li class="hero-section__li">
							<b>［リセット］</b>ボタンを押すとタイマーがリセットされます。
						</li>
					</ol>
				</section>
				<section class="timer-section">
					<progress class="progress-bar" value="0" max="100"></progress>
					<p class="remaining-text">
						残り<span class="remaining-time">0</span>秒
					</p>

					<dialog class="timer-section__modal">
						<form method="dialog">
							<p class="timer-section__modal-message">
								&#x1f973;&nbsp;完成&nbsp;&#x1f973;<br />さあ、召し上がれ！
							</p>
							<button class="timer-section__modal-close-button">閉じる</button>
						</form>
					</dialog>

					<form class="select-time">
						<fieldset class="select-time__fieldset">
							<legend class="select-time__legend">
								時間を選択してください
							</legend>
							<div class="select-time__radiobuttons">
								<input
									type="radio"
									name="time"
									class="select-time__option"
									value="120"
								/>
								<label class="select-time__label">2分</label>
								<input
									type="radio"
									name="time"
									class="select-time__option"
									value="180"
									checked
								/>
								<label class="select-time__label">3分</label>
								<input
									type="radio"
									name="time"
									class="select-time__option"
									value="300"
								/>
								<label class="select-time__label">5分</label>
								<input
									type="radio"
									name="time"
									class="select-time__option"
									id="custom-radio"
									value="custom"
								/>
								<label for="custom-radio" class="select-time__label"
									>カスタム</label
								>
								<input
									type="text"
									id="custom-time"
									class="select-time__custom-input"
									inputmode="numeric"
									placeholder="秒数"
									disabled
								/>
							</div>
							<div class="timer-buttons">
								<button type="button" class="button reset-button">
									<span class="button-emoji">&#x23f9;</span><br />リセット
								</button>
								<button type="button" class="button start-button">
									<span class="button-emoji">&#x25b6;</span><br />スタート
								</button>
							</div>
						</fieldset>
					</form>
				</section>
			</article>
		</main>
		<footer class="footer"></footer>
	</body>
</html>
